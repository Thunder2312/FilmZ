<app-header></app-header>
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>
<div class="signup-container">
  <div class="session">
    <div class="left">
      <!-- SVG Logo -->
      <svg
        enable-background="new 0 0 300 302.5"
        version="1.1"
        viewBox="0 0 300 302.5"
        xml:space="preserve"
        xmlns="http://www.w3.org/2000/svg"
      >
        <style type="text/css">
          .st0 {
            fill: #fff;
          }
        </style>
        <path
          class="st0"
          d="m126 302.2c-2.3 0.7-5.7 0.2-7.7-1.2l-105-71.6c-2-1.3-3.7-4.4-3.9-6.7l-9.4-126.7c-0.2-2.4 1.1-5.6 2.8-7.2l93.2-86.4c1.7-1.6 5.1-2.6 7.4-2.3l125.6 18.9c2.3 0.4 5.2 2.3 6.4 4.4l63.5 110.1c1.2 2 1.4 5.5 0.6 7.7l-46.4 118.3c-0.9 2.2-3.4 4.6-5.7 5.3l-121.4 37.4zm63.4-102.7c2.3-0.7 4.8-3.1 5.7-5.3l19.9-50.8c0.9-2.2 0.6-5.7-0.6-7.7l-27.3-47.3c-1.2-2-4.1-4-6.4-4.4l-53.9-8c-2.3-0.4-5.7 0.7-7.4 2.3l-40 37.1c-1.7 1.6-3 4.9-2.8 7.2l4.1 54.4c0.2 2.4 1.9 5.4 3.9 6.7l45.1 30.8c2 1.3 5.4 1.9 7.7 1.2l52-16.2z"
        />
      </svg>
    </div>

    <form (ngSubmit)="onSubmit()" #signUpForm="ngForm" autocomplete="off">
      <div class="floating-label">
        <input
          type="text"
          id="fullName"
          name="fullName"
          placeholder="Full Name"
          [(ngModel)]="signUpInfo.full_name"
          required
        />
        <label for="fullName">Full Name</label>
      </div>

      <div class="floating-label">
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          [(ngModel)]="signUpInfo.email"
          required
        />
        <label for="email">Email</label>
      </div>

      <div class="floating-label">
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="Phone Number"
          [(ngModel)]="signUpInfo.phone"
          required
        />
        <label for="phone">Phone Number</label>
      </div>

      <div class="floating-label">
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Username"
          [(ngModel)]="signUpInfo.username"
          required
        />
        <label for="username">Username</label>
      </div>

      <div class="floating-label password-wrapper">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          [(ngModel)]="signUpInfo.password"
          appPasswordToggle
          required
        />
        <label for="password">Password</label>
      </div>

      <div class="floating-label select-wrapper">
        <select
          id="role"
          name="role"
          [(ngModel)]="signUpInfo.role"
          required>
          <option value="" disabled selected hidden></option>
          <option value="Admin">Admin</option>
          <option value="User">User</option>
        </select>
        <label for="role">Role</label>
      </div>
      

      <button class="submit" type="submit">Sign Up</button>
    </form>
  </div>
</div>
